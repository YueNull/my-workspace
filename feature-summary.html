<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PDF Viewer 機能一覧</title>
<style>
  body { font-family: Meiryo, 'Segoe UI', sans-serif; background: #f5f0e8; color: #2a2a2a; margin: 0; padding: 16px; }
  h1 { font-size: 16px; margin-bottom: 4px; color: #3a2a10; }
  .subtitle { font-size: 11px; color: #888; margin-bottom: 12px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  button { padding: 5px 14px; border-radius: 4px; border: 1px solid #a09070; background: #fff; cursor: pointer; font-size: 12px; }
  button.primary { background: #4a7cb8; color: #fff; border-color: #3a6ca8; font-weight: 600; }
  button:hover { filter: brightness(1.08); }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; align-items: center; }
  .dot { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
  table { border-collapse: collapse; width: 100%; font-size: 12px; background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
  th { background: #4a7cb8; color: #fff; padding: 7px 10px; text-align: left; position: sticky; top: 0; z-index: 1; white-space: nowrap; }
  td { padding: 5px 10px; border-bottom: 1px solid #e0d8cc; vertical-align: top; }
  tr:hover td { background: #faf5ee; }
  .cat { font-weight: 600; color: #5a3a10; }
  .html-yes  { background: #d4edda; color: #155724; border-radius: 3px; padding: 1px 8px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .html-part { background: #fff3cd; color: #856404; border-radius: 3px; padding: 1px 8px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .html-no   { background: #f8d7da; color: #721c24; border-radius: 3px; padding: 1px 8px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .app-yes   { background: #cce5ff; color: #004085; border-radius: 3px; padding: 1px 8px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .note { font-size: 10px; color: #888; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  select, input[type=text] { padding: 4px 8px; border: 1px solid #a09070; border-radius: 4px; font-size: 12px; background: #fff; }
</style>
</head>
<body>
<h1>📋 PDF Viewer — 機能一覧・実装状況サマリー</h1>
<p class="subtitle">更新日: 2026-04-06　|　HTML版 + App化後の全機能対照表</p>

<div class="toolbar">
  <button class="primary" onclick="downloadCSV()">📥 Excelファイルとしてダウンロード (.csv)</button>
  <button onclick="window.print()">🖨 印刷</button>
  <div class="legend">
    <span class="dot" style="background:#d4edda;border:1px solid #c3e6cb;"></span><span>HTML実装済み</span>
    <span class="dot" style="background:#fff3cd;border:1px solid #ffc107;"></span><span>HTML部分対応</span>
    <span class="dot" style="background:#f8d7da;border:1px solid #f5c6cb;"></span><span>HTML不可</span>
    <span class="dot" style="background:#cce5ff;border:1px solid #b8daff;"></span><span>App化で実現</span>
  </div>
</div>

<div class="filter-row">
  <select id="filter-cat" onchange="applyFilter()">
    <option value="">全カテゴリ</option>
  </select>
  <select id="filter-html" onchange="applyFilter()">
    <option value="">HTML実装状況（全て）</option>
    <option value="✅">✅ 実装済み</option>
    <option value="⚠️">⚠️ 部分対応</option>
    <option value="❌">❌ 不可</option>
  </select>
  <input type="text" id="filter-text" placeholder="キーワード検索..." oninput="applyFilter()" style="min-width:200px;">
</div>

<table id="main-table">
<thead>
<tr>
  <th>#</th>
  <th>カテゴリ</th>
  <th>機能名</th>
  <th>詳細</th>
  <th>HTML版</th>
  <th>App版</th>
  <th>備考・実装方針</th>
</tr>
</thead>
<tbody id="table-body">
</tbody>
</table>

const EMOJI = { "✅": "html-yes", "⚠️": "html-part", "❌": "html-no" };

function buildTable(rows) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  let n = 1;
  const cats = new Set();
  rows.forEach(r => cats.add(r[0]));
  // Populate filter
  const sel = document.getElementById('filter-cat');
  if (sel.options.length <= 1) {
    [...cats].forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
  }
  rows.forEach(([cat, name, detail, html, app, note]) => {
    const tr = document.createElement('tr');
    const appClass = (html === "❌") ? "app-yes" : "html-yes";
    tr.innerHTML = `
      <td style="color:#aaa;font-size:10px;">${n++}</td>
      <td class="cat">${cat}</td>
      <td><b>${name}</b></td>
      <td>${detail}</td>
      <td><span class="${EMOJI[html] || 'html-yes'}">${html} ${html==="✅"?"実装済み":html==="⚠️"?"部分対応":"HTML不可"}</span></td>
      <td><span class="${appClass}">${app} ${app==="✅"?"対応":"—"}</span></td>
      <td class="note">${note}</td>
    `;
    tbody.appendChild(tr);
  });
}

function applyFilter() {
  const cat = document.getElementById('filter-cat').value;
  const html = document.getElementById('filter-html').value;
  const text = document.getElementById('filter-text').value.toLowerCase();
  const filtered = DATA.filter(r => {
    if (cat && r[0] !== cat) return false;
    if (html && r[3] !== html) return false;
    if (text && !r.join(' ').toLowerCase().includes(text)) return false;
    return true;
  });
  buildTable(filtered);
}

function downloadCSV() {
  const BOM = '\uFEFF';
  const header = ['#','カテゴリ','機能名','詳細','HTML版','App版','備考'];
  const rows = DATA.map((r, i) => [i+1, ...r]);
  const csv = BOM + [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'PDF_Viewer_機能一覧.csv';
  a.click();
}

buildTable(DATA);

</body>
</html>
